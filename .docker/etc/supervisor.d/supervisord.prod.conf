[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
loglevel=warn

[program:octane]
; --host must match public DNS (APP_DOMAIN) so Caddy TLS/SNI matches your hostname, not 127.0.0.1
command=php /var/www/html/artisan octane:frankenphp --host=%(ENV_APP_DOMAIN)s --https --http-redirect --caddyfile=/var/www/html/.docker/php/Caddyfile.prod --workers=4 --max-requests=1000 --admin-host=127.0.0.1 --admin-port=2019
user=root
autostart=true
autorestart=true
priority=1
stopwaitsecs=30
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:queue-worker-1]
command=php /var/www/html/artisan queue:work --tries=3 --timeout=90 --sleep=3 --max-jobs=1000 --max-time=3600
user=appuser
autostart=true
autorestart=true
priority=2
stopwaitsecs=30
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:queue-worker-2]
command=php /var/www/html/artisan queue:work --tries=3 --timeout=90 --sleep=3 --max-jobs=1000 --max-time=3600
user=appuser
autostart=true
autorestart=true
priority=2
stopwaitsecs=30
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[supervisorctl]
